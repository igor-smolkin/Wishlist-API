spring:
  datasource:
    username: postgres
    password: admin
    url: jdbc:postgresql://db:5432/wishlist
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 50

logging:
  level:
    root: INFO
    org.ataraxii.wishlist: DEBUG

app:
  security:
    public-paths:
      - /api/v1/login
      - /api/v1/register
      - /swagger-ui
      - /v3